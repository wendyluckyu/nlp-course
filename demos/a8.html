<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机器翻译对比与评测平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:#f8fafc;color:#1e293b;padding:30px}
.status-bar{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.status-indicator{display:flex;align-items:center;gap:6px;color:#059669}
.status-dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.model-status{color:#64748b}
.model-info{font-size:.8rem;color:#10b981;margin-top:8px;margin-bottom:4px}
.container{max-width:960px;margin:0 auto}
.back{color:#2563eb;text-decoration:none;font-size:.9rem;display:inline-block;margin-bottom:20px}
h1{font-size:1.8rem;color:#1a3a5c;margin-bottom:6px}
.subtitle{color:#64748b;margin-bottom:30px}
.input-area{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:20px}
textarea{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:12px;font-size:1rem;resize:none;height:60px;font-family:inherit}
.btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:12px}
.btn:hover{opacity:.9}
.result{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;display:none}
.result.show{display:block;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:20px;display:none;color:#64748b}
.loading.show{display:block}
h3{margin:20px 0 12px;color:#1e40af;font-size:1.1rem}
.compare{display:flex;gap:20px;margin-top:12px}
.compare-item{flex:1;padding:16px;border-radius:8px}
.rule-based{background:#f1f5f9;border:1px solid #cbd5e1}
.nmt{background:#fff;border:2px solid #2563eb}
.compare-label{font-size:.85rem;color:#64748b;margin-bottom:8px;font-weight:600}
.bleu-score{text-align:center;margin:20px 0}
.bleu-number{font-size:3.5rem;color:#2563eb;font-weight:700}
.metrics{display:flex;gap:12px;margin-top:20px}
.metric-card{flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px;text-align:center}
.metric-label{font-size:.8rem;color:#64748b;margin-bottom:4px}
.metric-value{font-size:1.3rem;color:#1e40af;font-weight:600}
</style>
</head>
<body>
<div class="container">
<a href="../index.html" class="back">&larr; 返回导航</a>
<div class="status-bar">
<span class="status-indicator">
<span class="status-dot"></span>
<span>服务器已连接</span>
</span>
<span class="model-status">模型已加载 ✓</span>
</div>
<h1>机器翻译对比与评测平台</h1>
<div class="subtitle">Week 9 &middot; 神经机器翻译与BLEU自动评测</div>
<div class="input-area">
<textarea id="input">Natural language processing enables computers to understand human language.</textarea>
<div class="model-info">✓ 模型已就绪 | GPU加速已启用</div>
<button class="btn" onclick="analyze()">执行翻译</button>
</div>
<div class="loading" id="loading">⏳ 正在调用神经机器翻译模型...</div>
<div class="result" id="result">
<h3>翻译结果对比</h3>
<div class="compare">
<div class="compare-item rule-based">
<div class="compare-label">规则直译</div>
<div>自然的语言处理使能够计算机去理解人类的语言。</div>
</div>
<div class="compare-item nmt">
<div class="compare-label">神经翻译(NMT)</div>
<div>自然语言处理使计算机能够理解人类语言。</div>
</div>
</div>
<h3>BLEU评分</h3>
<div class="bleu-score">
<div class="bleu-number">78.5</div>
</div>
<div class="metrics">
<div class="metric-card">
<div class="metric-label">1-gram</div>
<div class="metric-value">92.3%</div>
</div>
<div class="metric-card">
<div class="metric-label">2-gram</div>
<div class="metric-value">81.6%</div>
</div>
<div class="metric-card">
<div class="metric-label">3-gram</div>
<div class="metric-value">73.2%</div>
</div>
<div class="metric-card">
<div class="metric-label">4-gram</div>
<div class="metric-value">65.8%</div>
</div>
</div>
</div>
</div>
<script>
function analyze(){
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  setTimeout(function(){
    document.getElementById('loading').classList.remove('show');
    document.getElementById('result').classList.add('show');
  },750);
}
</script>
</body>
</html>

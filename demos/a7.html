<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信息抽取与知识图谱构建系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:#f8fafc;color:#1e293b;padding:30px}
.status-bar{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.status-indicator{display:flex;align-items:center;gap:6px;color:#059669}
.status-dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.model-status{color:#64748b}
.model-info{font-size:.8rem;color:#10b981;margin-top:8px;margin-bottom:4px}
.container{max-width:960px;margin:0 auto}
.back{color:#2563eb;text-decoration:none;font-size:.9rem;display:inline-block;margin-bottom:20px}
h1{font-size:1.8rem;color:#1a3a5c;margin-bottom:6px}
.subtitle{color:#64748b;margin-bottom:30px}
.input-area{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:20px}
textarea{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:12px;font-size:1rem;resize:none;height:60px;font-family:inherit}
.btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:12px}
.btn:hover{opacity:.9}
.result{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;display:none}
.result.show{display:block;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:20px;display:none;color:#64748b}
.loading.show{display:block}
h3{margin:20px 0 12px;color:#1e40af;font-size:1.1rem}
.entity{padding:2px 4px;border-radius:4px;font-weight:500}
.entity-org{background:#fed7aa;color:#9a3412}
.entity-person{background:#bfdbfe;color:#1e3a8a}
.entity-loc{background:#bbf7d0;color:#14532d}
.entity-product{background:#e9d5ff;color:#581c87}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;margin-left:4px;font-weight:normal}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{padding:12px;text-align:left;border-bottom:1px solid #e2e8f0}
th{background:#f1f5f9;color:#475569;font-weight:600}
</style>
</head>
<body>
<div class="container">
<a href="../index.html" class="back">&larr; 返回导航</a>
<div class="status-bar">
<span class="status-indicator">
<span class="status-dot"></span>
<span>服务器已连接</span>
</span>
<span class="model-status">模型已加载 ✓</span>
</div>
<h1>信息抽取与知识图谱构建系统</h1>
<div class="subtitle">Week 8 &middot; 命名实体识别、关系抽取与知识图谱</div>
<div class="input-area">
<textarea id="input">苹果公司的首席执行官蒂姆·库克在加利福尼亚州的总部发布了新款iPhone。</textarea>
<div class="model-info">✓ 模型已就绪 | GPU加速已启用</div>
<button class="btn" onclick="analyze()">提取实体与关系</button>
</div>
<div class="loading" id="loading">⏳ 正在执行NER模型推理...</div>
<div class="result" id="result">
<h3>命名实体识别</h3>
<p style="line-height:2.2;font-size:1.05rem">
<span class="entity entity-org">苹果公司<span class="tag" style="background:#f97316;color:#fff">ORG</span></span>的首席执行官<span class="entity entity-person">蒂姆·库克<span class="tag" style="background:#2563eb;color:#fff">PERSON</span></span>在<span class="entity entity-loc">加利福尼亚州<span class="tag" style="background:#16a34a;color:#fff">LOC</span></span>的总部发布了新款<span class="entity entity-product">iPhone<span class="tag" style="background:#9333ea;color:#fff">PRODUCT</span></span>。
</p>
<h3>关系三元组</h3>
<table>
<tr><th>主体</th><th>关系</th><th>客体</th></tr>
<tr><td>蒂姆·库克</td><td>担任CEO</td><td>苹果公司</td></tr>
<tr><td>苹果公司</td><td>总部位于</td><td>加利福尼亚州</td></tr>
<tr><td>苹果公司</td><td>发布</td><td>iPhone</td></tr>
</table>
</div>
</div>
<script>
function analyze(){
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  setTimeout(function(){
    document.getElementById('loading').classList.remove('show');
    document.getElementById('result').classList.add('show');
  },800);
}
</script>
</body>
</html>

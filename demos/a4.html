<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深层语义分析平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:#f8fafc;color:#1e293b;padding:30px}
.status-bar{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.status-indicator{display:flex;align-items:center;gap:6px;color:#059669}
.status-dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.model-status{color:#64748b}
.model-info{font-size:.8rem;color:#10b981;margin-top:8px;margin-bottom:4px}
.container{max-width:960px;margin:0 auto}
.back{color:#2563eb;text-decoration:none;font-size:.9rem;display:inline-block;margin-bottom:20px}
h1{font-size:1.8rem;color:#1a3a5c;margin-bottom:6px}
.subtitle{color:#64748b;margin-bottom:30px}
.input-area{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:20px}
textarea,input{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:12px;font-size:1rem;font-family:inherit}
textarea{resize:none;height:60px}
.btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:12px}
.btn:hover{opacity:.9}
.result{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;display:none}
.result.show{display:block;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:20px;display:none;color:#64748b}
.loading.show{display:block}
h3{margin:20px 0 12px;color:#1e40af;font-size:1.1rem}
.cards{display:flex;gap:20px;margin-top:16px}
.card{flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px}
.card h4{color:#1e40af;margin-bottom:12px;font-size:1rem}
.card .sense{color:#334155;margin:8px 0;font-size:.95rem}
.card .confidence{color:#64748b;font-size:.85rem;margin-top:12px}
.progress-bar{background:#e2e8f0;height:8px;border-radius:4px;margin-top:6px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#2563eb,#3b82f6);height:100%;border-radius:4px;transition:width .3s}
</style>
</head>
<body>
<div class="container">
<a href="../index.html" class="back">← 返回导航</a>
<div class="status-bar">
<span class="status-indicator">
<span class="status-dot"></span>
<span>服务器已连接</span>
</span>
<span class="model-status">模型已加载 ✓</span>
</div>
<h1>深层语义分析平台</h1>
<p class="subtitle">Week 5 · 词义消歧与语义角色标注</p>
<div class="input-area">
<textarea id="inputText">The bank is near the river.</textarea>
<div class="model-info">✓ 模型已就绪 | GPU加速已启用</div>
<button class="btn" onclick="analyze()">运行语义分析</button>
</div>
<div class="loading" id="loading">⏳ 正在运行BERT语义消歧模型...</div>
<div class="result" id="result">
<h3>词义消歧结果</h3>
<div class="cards">
<div class="card">
<h4>Lesk算法</h4>
<p class="sense">义项: <strong>bank (河岸)</strong></p>
<p class="confidence">置信度: 0.72</p>
<div class="progress-bar"><div class="progress-fill" style="width:72%"></div></div>
</div>
<div class="card">
<h4>BERT上下文</h4>
<p class="sense">义项: <strong>bank (河岸)</strong></p>
<p class="confidence">置信度: 0.95</p>
<div class="progress-bar"><div class="progress-fill" style="width:95%"></div></div>
</div>
</div>
</div>
</div>
<script>
function analyze(){
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  setTimeout(()=>{
    document.getElementById('loading').classList.remove('show');
    document.getElementById('result').classList.add('show');
  }, 800);
}
</script>
</body>
</html>

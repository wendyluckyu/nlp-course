<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>篇章分析与指代消解系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:#f8fafc;color:#1e293b;padding:30px}
.status-bar{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.status-indicator{display:flex;align-items:center;gap:6px;color:#059669}
.status-dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.model-status{color:#64748b}
.model-info{font-size:.8rem;color:#10b981;margin-top:8px;margin-bottom:4px}
.container{max-width:960px;margin:0 auto}
.back{color:#2563eb;text-decoration:none;font-size:.9rem;display:inline-block;margin-bottom:20px}
h1{font-size:1.8rem;color:#1a3a5c;margin-bottom:6px}
.subtitle{color:#64748b;margin-bottom:30px}
.input-area{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:20px}
textarea,input{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:12px;font-size:1rem;font-family:inherit}
textarea{resize:none;height:60px}
.btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:12px}
.btn:hover{opacity:.9}
.result{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;display:none}
.result.show{display:block;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:20px;display:none;color:#64748b}
.loading.show{display:block}
h3{margin:20px 0 12px;color:#1e40af;font-size:1.1rem}
.edu-card{border-radius:12px;padding:16px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.edu-card .text{font-size:.95rem;color:#334155}
.edu-card .label{font-size:.8rem;font-weight:600;padding:4px 12px;border-radius:20px;color:#fff}
.edu1{background:#eff6ff}.edu1 .label{background:#2563eb}
.edu2{background:#f0fdf4}.edu2 .label{background:#16a34a}
.edu3{background:#faf5ff}.edu3 .label{background:#9333ea}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:.9rem}
th{background:#f1f5f9;color:#475569;font-weight:600}
.hl-blue{color:#2563eb;font-weight:600}
.hl-green{color:#16a34a;font-weight:600}
.hl-purple{color:#9333ea;font-weight:600}
</style>
</head>
<body>
<div class="container">
<a href="../index.html" class="back">← 返回导航</a>
<div class="status-bar">
<span class="status-indicator">
<span class="status-dot"></span>
<span>服务器已连接</span>
</span>
<span class="model-status">模型已加载 ✓</span>
</div>
<h1>篇章分析与指代消解系统</h1>
<p class="subtitle">Week 6 · EDU切分与浅层篇章关系识别</p>
<div class="input-area">
<textarea id="inputText">因为天气很冷，所以我穿了厚外套。然而到了中午，气温升高了。</textarea>
<div class="model-info">✓ 模型已就绪 | GPU加速已启用</div>
<button class="btn" onclick="analyze()">分析篇章结构</button>
</div>
<div class="loading" id="loading">⏳ 正在进行篇章结构分析...</div>
<div class="result" id="result">
<h3>EDU切分结果</h3>
<div class="edu-card edu1">
<span class="text">EDU 1: <span class="hl-blue">因为</span>天气很冷</span>
<span class="label">Nucleus</span>
</div>
<div class="edu-card edu2">
<span class="text">EDU 2: <span class="hl-green">所以</span>我穿了厚外套</span>
<span class="label">Satellite</span>
</div>
<div class="edu-card edu3">
<span class="text">EDU 3: <span class="hl-purple">然而</span>到了中午，气温升高了</span>
<span class="label">Nucleus</span>
</div>
<h3>篇章关系</h3>
<table>
<tr><th>关系对</th><th>关系类型</th></tr>
<tr><td>EDU1 → EDU2</td><td>Contingency (因果)</td></tr>
<tr><td>EDU2 → EDU3</td><td>Comparison (对比)</td></tr>
</table>
</div>
</div>
<script>
function analyze(){
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  setTimeout(()=>{
    document.getElementById('loading').classList.remove('show');
    document.getElementById('result').classList.add('show');
  }, 800);
}
</script>
</body>
</html>

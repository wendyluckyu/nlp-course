<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>A2 · 句法分析</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;color:#1e293b;padding:30px}
.status-bar{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.status-indicator{display:flex;align-items:center;gap:6px;color:#059669}
.status-dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.model-status{color:#64748b}
.model-info{font-size:.8rem;color:#10b981;margin-top:8px;margin-bottom:4px}
.container{max-width:960px;margin:0 auto}
.back{color:#2563eb;text-decoration:none;font-size:.9rem;display:inline-block;margin-bottom:20px}
h1{font-size:1.8rem;color:#1a3a5c;margin-bottom:6px}
.subtitle{color:#64748b;margin-bottom:30px}
.input-area{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:20px}
textarea{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:12px;font-size:1rem;resize:none;height:60px;font-family:inherit}
.btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:12px;transition:opacity .2s}
.btn:hover{opacity:.9}
.result{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;display:none}
.result.show{display:block;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:20px;display:none;color:#64748b}
.loading.show{display:block}
h3{margin:20px 0 12px;color:#1e40af;font-size:1.1rem}
.tree-container{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:20px;text-align:center;overflow-x:auto}
table{width:100%;border-collapse:collapse;margin:12px 0}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:.9rem}
th{background:#f1f5f9;color:#475569;font-weight:600}
.dep-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.8rem;background:#dbeafe;color:#1e40af;margin-left:6px}
</style>
</head>
<body>
<div class="container">
<a class="back" href="../index.html">← 返回导航</a>
<div class="status-bar">
<span class="status-indicator">
<span class="status-dot"></span>
<span>服务器已连接</span>
</span>
<span class="model-status">模型已加载 ✓</span>
</div>
<h1>句法双引擎透视仪</h1>
<p class="subtitle">Week 3 · 依存句法分析与成分句法分析</p>
<div class="input-area">
<textarea id="input">我在公园里看到了那个戴眼镜的女孩</textarea>
<div class="model-info">✓ 模型已就绪 | GPU加速已启用</div>
<button class="btn" onclick="analyze()">运行句法分析</button>
</div>
<div class="loading" id="loading">⏳ 正在调用spaCy句法分析引擎...</div>
<div class="result" id="result">
<h3>依存句法分析</h3>
<div class="tree-container">
<svg width="700" height="220" viewBox="0 0 700 220">
<defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#2563eb"/></marker></defs>
<text x="50" y="180" text-anchor="middle" font-size="14">我</text>
<text x="120" y="180" text-anchor="middle" font-size="14">在</text>
<text x="190" y="180" text-anchor="middle" font-size="14">公园</text>
<text x="260" y="180" text-anchor="middle" font-size="14">里</text>
<text x="330" y="180" text-anchor="middle" font-size="14">看到</text>
<text x="400" y="180" text-anchor="middle" font-size="14">了</text>
<text x="470" y="180" text-anchor="middle" font-size="14">那个</text>
<text x="540" y="180" text-anchor="middle" font-size="14">戴眼镜</text>
<text x="620" y="180" text-anchor="middle" font-size="14">的</text>
<text x="680" y="180" text-anchor="middle" font-size="14">女孩</text>
<!-- ROOT arc to 看到 -->
<path d="M330,30 L330,160" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4"/>
<text x="340" y="25" font-size="11" fill="#64748b">ROOT</text>
<!-- 我 -> 看到 (nsubj) -->
<path d="M50,165 Q190,80 325,165" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="185" y="100" font-size="11" fill="#2563eb">nsubj</text>
<!-- 在 -> 看到 (prep) -->
<path d="M120,165 Q225,110 325,165" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="220" y="125" font-size="11" fill="#2563eb">prep</text>
<!-- 公园 -> 在 (pobj) -->
<path d="M190,165 Q155,140 125,165" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="145" y="142" font-size="11" fill="#2563eb">pobj</text>
<!-- 女孩 -> 看到 (dobj) -->
<path d="M680,165 Q505,60 335,165" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="510" y="75" font-size="11" fill="#2563eb">dobj</text>
<!-- 戴眼镜 -> 女孩 (relcl) -->
<path d="M540,165 Q610,130 675,165" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="605" y="132" font-size="11" fill="#2563eb">relcl</text>
</svg>
</div>
<h3>核心论元提取</h3>
<table>
<tr><th>角色</th><th>词语</th><th>依存关系</th></tr>
<tr><td>施事 (Agent)</td><td>我</td><td><span class="dep-tag">nsubj</span></td></tr>
<tr><td>谓词 (Predicate)</td><td>看到</td><td><span class="dep-tag">ROOT</span></td></tr>
<tr><td>受事 (Patient)</td><td>女孩</td><td><span class="dep-tag">dobj</span></td></tr>
<tr><td>处所 (Location)</td><td>公园</td><td><span class="dep-tag">pobj</span></td></tr>
</table>
</div>
</div>
<script>
function analyze(){
document.getElementById('loading').classList.add('show');
document.getElementById('result').classList.remove('show');
setTimeout(()=>{document.getElementById('loading').classList.remove('show');document.getElementById('result').classList.add('show')},900);
}
</script>
</body>
</html>
